<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketFlow</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    
    <div class="navbar">
        <h1 class="logo">TicketFlow</h1>

        <div class="nav-actions">
                <form action="{{ url_for('logout') }}" method="POST">
                    <button type="submit">Sign Out</button>
                </form>
        </div>
    </div>

    
    <div class="page">
        <div class="tiles">

            <div class="tile">
                <h2>Dashboard</h2>
                <p>View, edit, and track your support tickets.</p>
                <a href="{{ url_for('dashboard') }}">Open Dashboard</a>
                
            </div>

            <div class="tile">
                <h2>Create Ticket</h2>
                <p>Submit a new request for support or review.</p>
                <a href="{{ url_for('create_ticket') }}">New Ticket</a>
            </div>

            <div class="tile">
                <h2>Account Details</h2>
                <p>View your account information and user role.</p>
                <a href="{{ url_for('profile') }}">View Profile</a>
            </div>            


        </div>
    </div>

</body>
</html>
