<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ticket</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="page">
        <div class="card">

            <!-- TOPBAR -->
            <div class="topbar">
                <h1>Edit Ticket</h1>

                <a href="{{ url_for('dashboard') }}">
                    <button type="button">Back</button>
                </a>
            </div>

            <!-- FORM -->
            <form method="POST">

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" value="{{ current_ticket.title }}" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="body" rows="4" required>{{ current_ticket.body }}</textarea>
                </div>

                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority">
                        <option value="low" {% if current_ticket.priority == "low" %}selected{% endif %}>Low</option>
                        <option value="medium" {% if current_ticket.priority == "medium" %}selected{% endif %}>Medium</option>
                        <option value="high" {% if current_ticket.priority == "high" %}selected{% endif %}>High</option>
                    </select>
                </div>

                <button type="submit">Update Ticket</button>

            </form>

        </div>
    </div>

</body>
</html>
