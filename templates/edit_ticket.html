<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Ticket</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="create-ticket-page">

    <div class="navbar">
        <h1 class="logo">TicketFlow</h1>

        <div class="nav-actions">
            <form action="{{ url_for('logout') }}" method="POST">
                <button type="submit">Sign Out</button>
            </form>
        </div>
    </div>

    <div class="page">

        <div class="dashboard-card">

            <div class="dashboard-actions">
                <a href="{{ url_for('dashboard') }}" class="btn-dash-secondary">
                    ← Back
                </a>
            </div>

            <div class="dashboard-header">
                <h1>Edit Ticket</h1>
                <p>Update your existing ticket details.</p>
            </div>

            <form method="POST" class="ticket-form">

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" value="{{ current_ticket.title }}" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="body" rows="4" required>{{ current_ticket.body }}</textarea>
                </div>

                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority">
                        <option value="low" {% if current_ticket.priority == "low" %}selected{% endif %}>Low</option>
                        <option value="medium" {% if current_ticket.priority == "medium" %}selected{% endif %}>Medium</option>
                        <option value="high" {% if current_ticket.priority == "high" %}selected{% endif %}>High</option>
                    </select>
                </div>

                <button type="submit" class="btn-dash-primary">
                    Update Ticket
                </button>

            </form>

        </div>

    </div>

</body>
</html>
